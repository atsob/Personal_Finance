services:

  personal_finance:
    image: atsob/personal_finance:latest
    container_name: personal_finance
    network_mode: host
    environment:
      - DB_NAME=Finance
      - DB_USER=admin
      - DB_PASSWORD=password
      - DB_HOST=127.0.0.1
      - DB_PORT=5432
      - OLLAMA_IP=127.0.0.1
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=llama3.2:3b
      - PERSIST_DIR=/app/storage_rag
      #- OPENAI_API_KEY=...
      #- GOOGLE_API_KEY=...
      #- GROQ_API_KEY=...
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /mnt/dockerapps/docker/docker_data/personal_finance/data:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  personal_finance_scheduler:
    image: atsob/personal_finance:latest
    container_name: personal_finance_scheduler
    network_mode: host
    environment:
      - DB_NAME=Finance
      - DB_USER=admin
      - DB_PASSWORD=password
      - DB_HOST=127.0.0.1
      - DB_PORT=5432
      - OLLAMA_IP=127.0.0.1
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=llama3.2:3b
      - PERSIST_DIR=/app/storage_rag
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /mnt/dockerapps/docker/docker_data/personal_finance/data:/app
    command: python scheduler.py
    restart: unless-stopped